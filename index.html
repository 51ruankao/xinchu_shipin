        body { background: linear-gradient(145deg, #f4f8fc 0%, #e6eef5 100%); min-height: 100vh; padding: 16px; }
        .app-wrapper { max-width: 1200px; margin: 0 auto; background: rgba(255,255,255,0.65); backdrop-filter: blur(14px); border-radius: 40px; padding: 24px 20px; }

        .status-message.error { background: #ffe6e6; color: #b13e3e; }

        .folder-header:hover { background: rgba(200,220,240,0.15); }
        .folder-header-left { display: flex; align-items: center; gap: 12px; }

        .folder-toggle { font-size: 1.1rem; color: #4f7f99; transition: transform 0.25s ease; }
        .folder-toggle.open { transform: rotate(180deg); }
        .folder-content { max-height: 0; overflow: hidden; transition: max-height 0.4s ease, padding 0.2s ease; padding: 0 20px; }
        .folder-content.open { max-height: 5000px; padding: 0 20px 20px 20px; }

            margin-left: 10px !important;
            border-left: 3px solid #c5dceb !important;
            padding-left: 10px !important;
            border-radius: 16px !important;
            margin-bottom: 12px !important;

        }
        .sub-folder .folder-content {
            padding: 0 8px !important;
        }
        .sub-folder .folder-content.open {

        .video-player-container {

            height: 100%;
            display: block;
            background: #f0f4f8;
            object-fit: contain;
        }

            text-align: center;

            color: #21506a;
            border: 1px dashed #b6d0e0;

            font-size: 0.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;

        .unlock-hint { margin-top: 6px; font-size: 0.65rem; color: #5f7e93; background: #eaf3fa; padding: 2px 12px; border-radius: 60px; display: inline-block; align-self: flex-start; }

        .footer-note { margin-top: 32px; text-align: center; color: #406b81; font-size: 0.8rem; border-top: 1px solid rgba(0,0,0,0.03); padding-top: 20px; display: flex; flex-wrap: wrap; justify-content: center; gap: 14px; }

        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1a2a38; color: white; padding: 12px 24px; border-radius: 60px; font-weight: 500; z-index: 999; opacity: 0; transition: opacity 0.4s; pointer-events: none; font-size: 0.9rem; }

        .toast.success { background: #1f7a5a; }
        .toast.error { background: #b13e3e; }
        .activated-user { display: inline-flex; align-items: center; gap: 10px; background: #dff0e6; padding: 6px 16px; border-radius: 60px; color: #1b6b4a; font-weight: 500; margin: 0 auto; font-size: 0.9rem; }

            .video-grid {

            .video-desc { font-size: 0.65rem; }
            .video-player-placeholder { font-size: 0.65rem; padding: 4px 8px; min-height: 30px; }
            .unlock-hint { font-size: 0.55rem; padding: 1px 8px; }
            .activation-badge { font-size: 0.75rem; padding: 6px 14px; }
            .footer-note { font-size: 0.7rem; gap: 10px; }
            .activated-user { font-size: 0.8rem; padding: 4px 12px; }

        // ================================================================
        // GitHub API
        // ================================================================
        async function checkPhoneOnGitHub(phone) {
            const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/issues?labels=${encodeURIComponent(LABEL_ACTIVATED)}&state=open&per_page=100`;
            const response = await fetch(url, {
                headers: {
                    'Authorization': `token ${GITHUB_TOKEN}`,
                    'Accept': 'application/vnd.github.v3+json'
                }
            });
            if (!response.ok) {
                throw new Error(`GitHub API 错误: ${response.status}`);
            }
            const issues = await response.json();
            return issues.some(issue => issue.title.trim() === phone.trim());
        }

        function getStoredPhone() {
            try {
                const value = localStorage.getItem(STORAGE_KEY);
                return value || '';
            } catch (e) {
                return '';
            }
        }

        function setStoredPhone(phone) {
            try {
                localStorage.setItem(STORAGE_KEY, phone);
            } catch (e) {
                console.warn('保存 localStorage 失败:', e);
            }
        }

        function clearStoredPhone() {
            try {
                localStorage.removeItem(STORAGE_KEY);
            } catch (e) {
                console.warn('清除 localStorage 失败:', e);

            if (type === 'success') toast.classList.add('success');
            else if (type === 'error') toast.classList.add('error');
            toast.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => { toast.classList.remove('show'); }, 3000);
        }

            statusMsg.innerHTML = message;
            statusMsg.className = 'status-message';
            if (type === 'success') statusMsg.classList.add('success');
            else if (type === 'error') statusMsg.classList.add('error');

                    html += `</div></div></div>`;

                    <div class="folder-header" data-target="${category.id}">
                        <div class="folder-header-left">
                            <i class="fas ${category.icon}"></i>
                            <h2>${category.name}</h2>
                            <span class="badge-count">${totalVideos} 节</span>
                        </div>
                        <div class="folder-toggle" data-target="${category.id}">
                            <i class="fas fa-chevron-down"></i>
                        </div>
                    </div>
                    <div class="folder-content" id="content-${category.id}">`;

                    child.videos.forEach((video, vIdx) => {

                        html += `

                                <div class="video-thumbnail">
                                    <img src="${posterUrl}" alt="${video.title}" loading="lazy">
                                    <div class="lock-overlay" style="display:${lockDisplay};"><i class="fas fa-lock"></i></div>
                                </div>
                                <div class="video-meta">

                                        ${video.title}

                                    </div>
                                    <div class="video-desc"><i class="fas fa-tag"></i> ${video.desc}</div>

                                </div>

                        `;

                    html += `</div></div></div>`;
                });

                html += `</div></div>`;
            });

            container.innerHTML = html;

            // ================================================================
            // ★★★ 绑定视频自动暂停事件 ★★★
            // ================================================================
            // 清空之前的视频列表
            allVideos = [];
            // 获取所有 video 元素
            const videoElements = container.querySelectorAll('video');
            videoElements.forEach(function(video) {
                allVideos.push(video);
                video.addEventListener('play', function() {
                    pauseAllOtherVideos(this);
                });
            });

            // 绑定一级折叠事件
            document.querySelectorAll('.folder-header:not(.sub-header)').forEach(header => {
                header.addEventListener('click', function(e) {
                    if (e.target.closest('.sub-header')) return;
                    const targetId = this.dataset.target;
                    const content = document.getElementById(`content-${targetId}`);
                    const toggleIcon = this.querySelector('.folder-toggle i');
                    if (content) {
                        content.classList.toggle('open');
                        this.querySelector('.folder-toggle').classList.toggle('open');
                        toggleIcon.className = content.classList.contains('open') ? 'fas fa-chevron-up' : 'fas fa-chevron-down';

                });

            // 绑定二级折叠事件
            document.querySelectorAll('.sub-header').forEach(header => {
                header.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const targetId = this.dataset.target;
                    const content = document.getElementById(`content-${targetId}`);

                    if (content) {
                        content.classList.toggle('open');

        // ================================================================
        // ★★★ 更新所有卡片状态（同时重新绑定视频事件） ★★★
        // ================================================================
        function updateAllCards(activated) {
            const cards = document.querySelectorAll('.video-card');
            cards.forEach(card => {
                const isUnlocked = activated;

                const lockOverlay = card.querySelector('.lock-overlay');
                const playerContainer = card.querySelector('.video-player-container');
                const placeholder = card.querySelector('.video-player-placeholder');
                const unlockHint = card.querySelector('.unlock-hint');

                if (isUnlocked) {
                    card.classList.remove('locked');
                    card.dataset.locked = 'false';
                    if (lockOverlay) lockOverlay.style.display = 'none';
                    if (placeholder) placeholder.style.display = 'none';
                    if (playerContainer) playerContainer.style.display = 'block';
                    unlockHint.innerHTML = '<i class="fas fa-check-circle" style="color:#2a7a4a;"></i> 已解锁';
                    unlockHint.style.background = '#dff0e6';
                    unlockHint.style.color = '#1b6b4a';
                } else {
                    card.classList.add('locked');
                    card.dataset.locked = 'true';
                    if (lockOverlay) lockOverlay.style.display = 'flex';
                    if (placeholder) placeholder.style.display = 'flex';
                    if (playerContainer) playerContainer.style.display = 'none';
                    unlockHint.innerHTML = '<i class="fas fa-lock"></i> 需要激活';
                    unlockHint.style.background = '#eaf3fa';
                    unlockHint.style.color = '#5f7e93';
                }
            });

            // 重新绑定视频事件（因为 DOM 被更新了）
            allVideos = [];
            const videoElements = container.querySelectorAll('video');
            videoElements.forEach(function(video) {
                allVideos.push(video);
                video.addEventListener('play', function() {
                    pauseAllOtherVideos(this);
                });
            });

            globalStatusText.textContent = activated ? `已激活 (${activePhone})` : '未激活';
            globalStatusText.style.color = activated ? '#1b7a4a' : '#b13e3e';
        }

        function showRememberedUser(phone) {
            rememberedPhoneDisplay.textContent = phone;
            rememberedArea.style.display = 'block';
            activationArea.style.display = 'none';
        }

        function hideRememberedUser() {
            rememberedArea.style.display = 'none';
            activationArea.style.display = 'flex';
        }

        async function performActivation(phone, remember = true) {
            if (!phone || phone.trim() === '') {
                setStatus('⚠️ 请输入手机号码', 'error');
                return false;
            }
            const rawPhone = phone.trim();
            if (!/^\d{11}$/.test(rawPhone)) {
                setStatus('❌ 请输入11位有效手机号', 'error');
                return false;
            }

            setStatus('⏳ 正在验证...', 'info');
            try {
                const authorized = await checkPhoneOnGitHub(rawPhone);
                if (authorized) {
                    isActivated = true;
                    activePhone = rawPhone;
                    setStatus(`✅ 激活成功！欢迎回来`, 'success');
                    updateAllCards(true);
                    phoneInput.value = rawPhone;
                    showToast(`✅ 欢迎回来，${rawPhone}`, 'success');

                    if (remember) {
                        setStoredPhone(rawPhone);
                        showRememberedUser(rawPhone);
                    }
                    return true;
                } else {
                    isActivated = false;
                    activePhone = '';
                    setStatus(`❌ 该手机号未激活，请联系管理员`, 'error');
                    updateAllCards(false);
                    showToast(`❌ 手机号未激活`, 'error');
                    return false;
                }
            } catch (err) {
                setStatus(`❌ 验证失败: ${err.message}`, 'error');
                showToast(`❌ ${err.message}`, 'error');
                return false;
            }
        }

        function deactivate() {
            isActivated = false;
            activePhone = '';
            setStatus('🔒 已退出激活', 'info');
            updateAllCards(false);
            phoneInput.value = '';
            clearStoredPhone();
            hideRememberedUser();
        }

        async function tryAutoLogin() {
            const storedPhone = getStoredPhone();
            if (storedPhone) {
                setStatus('⏳ 正在自动验证...', 'info');
                try {
                    const authorized = await checkPhoneOnGitHub(storedPhone);
                    if (authorized) {
                        isActivated = true;
                        activePhone = storedPhone;
                        updateAllCards(true);
                        showRememberedUser(storedPhone);
                        setStatus(`✅ 已自动激活 (${storedPhone})`, 'success');
                        showToast(`✅ 欢迎回来，${storedPhone}`, 'success');
                        return true;
                    } else {
                        clearStoredPhone();
                        hideRememberedUser();
                        setStatus('📱 该手机号已被撤销，请重新输入', 'info');
                        return false;
                    }
                } catch (err) {
                    console.error('自动登录失败:', err);
                    setStatus('📱 请手动输入手机号激活', 'info');
                    return false;
                }
            }
            return false;
        }

        async function init() {
            renderCategories(false);
            updateAllCards(false);

            const loggedIn = await tryAutoLogin();
            if (!loggedIn) {
                hideRememberedUser();
                setStatus('📱 输入已激活的手机号，解锁全部视频', 'info');
            }

            console.log('🎯 信息处理技术员视频学习平台已加载（五类，62节）');
            console.log('📁 结构: 学前必看 → 实操(Word/Excel/PPT/Access) → 理论(7个子类) → 题目讲解 → 难点回顾');
            console.log('📌 视频协议:', PROTOCOL);
            console.log('🔇 自动暂停功能已启用：播放新视频时自动暂停其他视频');
        }

        activateBtn.addEventListener('click', function() {
            performActivation(phoneInput.value);
        });

        phoneInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                activateBtn.click();
            }
        });

        phoneInput.addEventListener('input', function() {
            this.value = this.value.replace(/\D/g, '');
        });

        logoutBtn.addEventListener('click', function() {
            if (confirm('确认退出当前账号？下次需要重新输入手机号。')) {
                deactivate();
                hideRememberedUser();
                setStatus('🔒 已退出，请输入手机号重新激活', 'info');
                showToast('✅ 已退出', 'success');
            }
        });

        init();
    })();
