<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>成考 · 学习平台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background: linear-gradient(145deg, #f4f8fc 0%, #e6eef5 100%); min-height: 100vh; padding: 16px; }
        .app-wrapper { max-width: 1200px; margin: 0 auto; background: rgba(255,255,255,0.65); backdrop-filter: blur(14px); border-radius: 40px; padding: 24px 20px; }
        .header { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 14px; border-bottom: 2px dashed rgba(0,40,60,0.10); }
        .logo-area { display: flex; align-items: center; gap: 10px; }
        .logo-icon { background: #1a3b4f; color: white; width: 40px; height: 40px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .logo-text { font-weight: 700; font-size: 1.5rem; color: #0a2a38; }
        .logo-text span { color: #2f7a9e; font-weight: 300; }
        .activation-badge { background: #ffffffcc; padding: 8px 18px; border-radius: 100px; font-weight: 500; color: #1f4b62; font-size: 0.85rem; display: flex; align-items: center; gap: 10px; }

        /* ★★★ 强制内联样式覆盖所有问题 ★★★ */
        .activation-area { background: #ffffffdd; border-radius: 40px; padding: 16px 20px; margin-bottom: 24px; display: flex; flex-wrap: wrap; align-items: center; justify-content: center; gap: 14px 16px; border: 1px solid rgba(255,255,255,0.9); }
        .activation-input-group { display: flex; flex-wrap: wrap; align-items: center; gap: 10px; flex: 2 1 280px; }
        .activation-input-group label { font-weight: 600; color: #174052; font-size: 0.95rem; display: flex; align-items: center; gap: 6px; }
        .activation-input-group input { flex: 1; min-width: 150px; padding: 12px 18px; border: 1.5px solid #d5e3ec; border-radius: 60px; font-size: 1rem; background: #f2f8fe; outline: none; }
        .activation-input-group input:focus { border-color: #2f8db0; background: white; box-shadow: 0 0 0 4px rgba(47,141,176,0.15); }
        .btn { background: #eef4f9; border: none; padding: 12px 28px; border-radius: 60px; font-weight: 600; font-size: 0.95rem; color: #1f4b62; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; border: 1px solid rgba(255,255,255,0.6); }
        .btn-primary { background: #1a4d66; color: white; border: 1px solid #2b6d8a; }
        .btn-primary:hover { background: #0f3f55; transform: scale(1.02); }
        .btn-danger { background: #b13e3e; color: white; border: 1px solid #8a2e2e; padding: 5px 14px; font-size: 0.8rem; }
        .btn-danger:hover { background: #8a2e2e; transform: scale(1.02); }
        .status-message { font-size: 0.9rem; padding: 5px 14px; border-radius: 40px; background: #e7f1f8; color: #1c5770; display: inline-flex; align-items: center; gap: 8px; font-weight: 500; }
        .status-message.success { background: #dff0e6; color: #1b6b4a; }
        .status-message.error { background: #ffe6e6; color: #b13e3e; }

        .subject-folder { background: #ffffffdd; border-radius: 28px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.8); overflow: hidden; }
        .folder-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; cursor: pointer; border-radius: 28px; }
        .folder-header:hover { background: rgba(200,220,240,0.15); }
        .folder-header-left { display: flex; align-items: center; gap: 12px; }
        .folder-header-left i { font-size: 1.4rem; color: #2f7a9e; width: 30px; text-align: center; }
        .folder-header-left h2 { font-size: 1.2rem; font-weight: 700; color: #123b4f; }
        .folder-header-left .badge-count { background: #c5dceb; padding: 3px 12px; border-radius: 40px; font-size: 0.7rem; font-weight: 600; color: #104257; margin-left: 6px; }
        .folder-toggle { font-size: 1.1rem; color: #4f7f99; transition: transform 0.25s ease; }
        .folder-toggle.open { transform: rotate(180deg); }
        .folder-content { max-height: 0; overflow: hidden; transition: max-height 0.4s ease, padding 0.2s ease; padding: 0 20px; }
        .folder-content.open { max-height: 5000px; padding: 0 20px 20px 20px; }
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px,1fr)); gap: 18px; margin-top: 4px; }
        .video-card { background: #ffffffdd; border-radius: 20px; padding: 12px; box-shadow: 0 4px 12px -6px rgba(0,30,40,0.04); border: 1px solid rgba(255,255,255,0.8); display: flex; flex-direction: column; }
        .video-card:hover { transform: translateY(-2px); box-shadow: 0 12px 24px -10px rgba(0,50,70,0.12); border-color: #cce0ed; }
        .video-thumbnail { position: relative; border-radius: 14px; overflow: hidden; background: #0e2a38; aspect-ratio: 16/9; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; }
        .video-thumbnail i { font-size: 2.2rem; color: rgba(255,255,255,0.5); }
        .video-card.locked .video-thumbnail i { color: rgba(255,215,120,0.5); }
        .video-thumbnail .lock-overlay { position: absolute; inset: 0; background: rgba(10,30,42,0.45); backdrop-filter: blur(2px); display: flex; align-items: center; justify-content: center; font-size: 1.4rem; color: #ffd966; }
        .video-meta { flex: 1; display: flex; flex-direction: column; }
        .video-title { font-weight: 700; font-size: 0.9rem; color: #12303f; margin-bottom: 2px; display: flex; align-items: center; justify-content: space-between; }
        .video-title .section-num { font-size: 0.6rem; background: #dce8f2; padding: 2px 10px; border-radius: 40px; font-weight: 600; color: #1a4d66; }
        .video-desc { color: #4d6f86; font-size: 0.75rem; margin-bottom: 6px; display: flex; align-items: center; gap: 4px; }
        .video-desc i { color: #598aa8; font-size: 0.7rem; }
        .video-player-container { margin-top: 2px; border-radius: 14px; overflow: hidden; background: #0a1e2a; width: 100%; aspect-ratio: 16/9; }
        .video-player-container video { width: 100%; height: 100%; display: block; background: #0a1e2a; object-fit: contain; }
        .video-card.locked .video-player-container { display: none; }
        .video-card.locked .video-player-placeholder { display: flex; }
        .video-player-placeholder { background: #eaf2f9; border-radius: 60px; padding: 8px 12px; text-align: center; font-weight: 500; color: #21506a; border: 1px dashed #b6d0e0; margin-top: 2px; font-size: 0.8rem; display: flex; align-items: center; justify-content: center; gap: 6px; min-height: 40px; }
        .video-card.locked .video-player-placeholder { background: #f2f2f2; color: #7d7d7d; border-color: #d6d6d6; }
        .video-card.locked .video-player-placeholder i { color: #a0a0a0; }
        .unlock-hint { margin-top: 6px; font-size: 0.65rem; color: #5f7e93; background: #eaf3fa; padding: 2px 12px; border-radius: 60px; display: inline-block; align-self: flex-start; }
        .video-card.locked .unlock-hint i { color: #a0b8c9; }
        .free-tag { background: #ff6b35; color: white; padding: 1px 8px; border-radius: 40px; font-size: 0.55rem; font-weight: 700; margin-left: 4px; }
        .footer-note { margin-top: 32px; text-align: center; color: #406b81; font-size: 0.8rem; border-top: 1px solid rgba(0,0,0,0.03); padding-top: 20px; display: flex; flex-wrap: wrap; justify-content: center; gap: 14px; }
        .footer-note i { margin-right: 4px; color: #2d7a9e; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1a2a38; color: white; padding: 12px 24px; border-radius: 60px; font-weight: 500; z-index: 999; opacity: 0; transition: opacity 0.4s; pointer-events: none; font-size: 0.9rem; }
        .toast.show { opacity: 1; }
        .toast.success { background: #1f7a5a; }
        .toast.error { background: #b13e3e; }
        .activated-user { display: inline-flex; align-items: center; gap: 10px; background: #dff0e6; padding: 6px 16px; border-radius: 60px; color: #1b6b4a; font-weight: 500; margin: 0 auto; font-size: 0.9rem; }
        .activated-user i { color: #1b6b4a; }
        .remembered-area { text-align: center; margin-bottom: 16px; display: none; }

        /* ================================================================
                   ★★★ 手机端适配（强制内联覆盖） ★★★
                   ================================================================ */
        @media (max-width: 600px) {
            body { padding: 10px; }
            .app-wrapper { padding: 16px 12px; border-radius: 28px; }
            .header { flex-direction: column; align-items: stretch; gap: 10px; }
            .logo-text { font-size: 1.2rem; }

            .activation-area {
                padding: 6px 10px !important;
                gap: 4px !important;
                border-radius: 20px !important;
            }

            .status-message {
                font-size: 0.7rem !important;
                padding: 2px 8px !important;
            }

            .activation-input-group label {
                display: none !important;
            }

            .activation-input-group {
                display: flex !important;
                flex-direction: row !important;
                flex-wrap: wrap !important;
                align-items: center !important;
                gap: 4px !important;
            }
            .activation-input-group input {
                flex: 1 !important;
                min-width: 60px !important;
                padding: 4px 10px !important;
                font-size: 0.75rem !important;
                height: 30px !important;
                border: 1.5px solid #d5e3ec !important;
                border-radius: 40px !important;
                background: #f2f8fe !important;
                outline: none !important;
            }
            .activation-input-group .btn {
                flex: 0 0 auto !important;
                padding: 4px 12px !important;
                font-size: 0.7rem !important;
                height: 30px !important;
            }

            .folder-header { padding: 12px 14px; }
            .folder-header-left h2 { font-size: 1rem; }
            .folder-content { padding: 0 14px; }
            .folder-content.open { padding: 0 14px 14px 14px; }
            .video-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }
            .video-card { padding: 8px; border-radius: 14px; }
            .video-thumbnail { border-radius: 10px; }
            .video-thumbnail i { font-size: 1.6rem; }
            .video-title { font-size: 0.75rem; flex-wrap: wrap; gap: 2px; }
            .video-title .section-num { font-size: 0.5rem; padding: 1px 8px; }
            .video-desc { font-size: 0.65rem; }
            .video-player-placeholder { font-size: 0.65rem; padding: 4px 8px; min-height: 30px; }
            .unlock-hint { font-size: 0.55rem; padding: 1px 8px; }
            .free-tag { font-size: 0.5rem; padding: 1px 6px; }
            .activation-badge { font-size: 0.75rem; padding: 6px 14px; }
            .footer-note { font-size: 0.7rem; gap: 10px; }
            .activated-user { font-size: 0.8rem; padding: 4px 12px; }
            .toast { font-size: 0.8rem; padding: 10px 18px; bottom: 16px; }
        }

        @media (max-width: 400px) {
            .video-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 8px;
            }
            .video-title { font-size: 0.7rem; }
            .video-desc { font-size: 0.6rem; }
            .activation-input-group input {
                min-width: 50px !important;
                padding: 3px 8px !important;
                font-size: 0.7rem !important;
                height: 26px !important;
            }
            .activation-input-group .btn {
                padding: 3px 10px !important;
                font-size: 0.65rem !important;
                height: 26px !important;
            }
        }
    </style>
</head>
<body>
<div class="app-wrapper">
    <header class="header">
        <div class="logo-area">
            <div class="logo-icon"><i class="fas fa-graduation-cap"></i></div>
            <div class="logo-text">成考<span>· 云课堂</span></div>
        </div>
        <div class="activation-badge">
            <i class="fas fa-shield-alt"></i>
            <span>状态: <span id="globalStatusText">未激活</span></span>
        </div>
    </header>

    <!-- ★★★ 添加内联样式强制覆盖 ★★★ -->
    <div class="activation-area" id="activationArea" style="padding: 6px 10px !important; gap: 4px !important; border-radius: 20px !important;">
        <div class="activation-input-group" style="display: flex !important; flex-direction: row !important; flex-wrap: wrap !important; align-items: center !important; gap: 4px !important;">
            <label for="phoneInput" style="display: none !important;"><i class="fas fa-phone-alt"></i> 手机号</label>
            <input type="tel" id="phoneInput" placeholder="请输入手机号码" maxlength="11" style="flex: 1 !important; min-width: 60px !important; padding: 4px 10px !important; font-size: 0.75rem !important; height: 30px !important; border: 1.5px solid #d5e3ec !important; border-radius: 40px !important; background: #f2f8fe !important; outline: none !important;">
            <button class="btn btn-primary" id="activateBtn" style="flex: 0 0 auto !important; padding: 4px 12px !important; font-size: 0.7rem !important; height: 30px !important; background: #1a4d66 !important; color: white !important; border: 1px solid #2b6d8a !important; border-radius: 60px !important; cursor: pointer !important;"><i class="fas fa-unlock"></i> 激活</button>
        </div>
        <div id="statusMessage" class="status-message" style="font-size: 0.7rem !important; padding: 2px 8px !important;">
            <i class="fas fa-info-circle"></i> 输入手机号激活
        </div>
    </div>

    <div class="remembered-area" id="rememberedArea">
        <div class="activated-user">
            <i class="fas fa-check-circle"></i>
            <span>当前已激活: <strong id="rememberedPhoneDisplay"></strong></span>
            <button class="btn btn-danger" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> 退出</button>
        </div>
    </div>

    <div id="subjectContainer"></div>

    <div class="footer-note">
        <span><i class="fas fa-video"></i> 成考语数外 · 每科12节精讲</span>
        <span><i class="fas fa-cloud-upload-alt"></i> 七牛云存储</span>
        <span><i class="fas fa-gift"></i> 第1、3、5节免费试看</span>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    (function() {
        // ================================================================
        // ★★★ GitHub 配置 ★★★
        // ================================================================
        const urlParams = new URLSearchParams(window.location.search);
        const GITHUB_TOKEN = urlParams.get('token');
        if (!GITHUB_TOKEN) {
            document.body.innerHTML = '<div style="padding:50px;text-align:center;font-size:18px;color:#b13e3e;">⚠️ 缺少 token 参数<br><br><small>访问格式: index2.html?token=你的Token</small></div>';
            throw new Error('缺少 token 参数');
        }

        const REPO_OWNER = '51chengkao';
        const REPO_NAME = 'study';
        const LABEL_ACTIVATED = '已激活';
        const BASE_VIDEO_URL = 'http://cddsw.zyzcc.cn/26xinjian/';
        const STORAGE_KEY = 'chengkao_activated_phone';

        // ================================================================
        // 科目数据
        // ================================================================
        const subjectsData = [
            { id: 'chinese', name: '语文', icon: 'fa-book-open', prefix: '01xinxiyuxinxihua' },
            { id: 'math', name: '数学', icon: 'fa-square-root-variable', prefix: '02shuxue' },
            { id: 'english', name: '英语', icon: 'fa-language', prefix: '03yingyu' }
        ];

        function generateLessons(subject) {
            const lessons = [];
            for (let i = 1; i <= 12; i++) {
                const num = String(i).padStart(2, '0');
                const isFree = [1, 3, 5].includes(i);
                lessons.push({
                    title: `第${i}节 · 精讲`,
                    desc: `成考${subject.name}第${i}讲`,
                    videoSrc: `${BASE_VIDEO_URL}${subject.prefix}${num}.mp4`,
                    isFree: isFree
                });
            }
            return lessons;
        }

        // ================================================================
        // GitHub API
        // ================================================================
        async function checkPhoneOnGitHub(phone) {
            const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/issues?labels=${encodeURIComponent(LABEL_ACTIVATED)}&state=open&per_page=100`;
            const response = await fetch(url, {
                headers: {
                    'Authorization': `token ${GITHUB_TOKEN}`,
                    'Accept': 'application/vnd.github.v3+json'
                }
            });
            if (!response.ok) {
                throw new Error(`GitHub API 错误: ${response.status}`);
            }
            const issues = await response.json();
            return issues.some(issue => issue.title.trim() === phone.trim());
        }

        // ================================================================
        // localStorage 操作
        // ================================================================
        function getStoredPhone() {
            try {
                const value = localStorage.getItem(STORAGE_KEY);
                console.log('📖 读取 localStorage:', value);
                return value || '';
            } catch (e) {
                console.warn('读取 localStorage 失败:', e);
                return '';
            }
        }

        function setStoredPhone(phone) {
            try {
                localStorage.setItem(STORAGE_KEY, phone);
                console.log('💾 保存到 localStorage:', phone);
                const saved = localStorage.getItem(STORAGE_KEY);
                console.log('✅ 验证保存:', saved);
            } catch (e) {
                console.warn('保存 localStorage 失败:', e);
            }
        }

        function clearStoredPhone() {
            try {
                localStorage.removeItem(STORAGE_KEY);
                console.log('🗑️ 已清除 localStorage');
            } catch (e) {
                console.warn('清除 localStorage 失败:', e);
            }
        }

        // ================================================================
        // DOM 操作
        // ================================================================
        const container = document.getElementById('subjectContainer');
        const phoneInput = document.getElementById('phoneInput');
        const activateBtn = document.getElementById('activateBtn');
        const statusMsg = document.getElementById('statusMessage');
        const globalStatusText = document.getElementById('globalStatusText');
        const toast = document.getElementById('toast');
        const rememberedArea = document.getElementById('rememberedArea');
        const rememberedPhoneDisplay = document.getElementById('rememberedPhoneDisplay');
        const logoutBtn = document.getElementById('logoutBtn');
        const activationArea = document.getElementById('activationArea');

        let isActivated = false;
        let activePhone = '';
        let toastTimer = null;

        function showToast(message, type = 'info') {
            toast.textContent = message;
            toast.className = 'toast';
            if (type === 'success') toast.classList.add('success');
            else if (type === 'error') toast.classList.add('error');
            toast.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => { toast.classList.remove('show'); }, 3000);
        }

        function setStatus(message, type = 'info') {
            statusMsg.innerHTML = message;
            statusMsg.className = 'status-message';
            if (type === 'success') statusMsg.classList.add('success');
            else if (type === 'error') statusMsg.classList.add('error');
        }

        function renderSubjects(activated) {
            if (!container) return;
            let html = '';
            subjectsData.forEach((subject) => {
                const lessons = generateLessons(subject);
                const subjectId = subject.id;
                html += `<div class="subject-folder" data-subject="${subjectId}">
                    <div class="folder-header" data-target="${subjectId}">
                        <div class="folder-header-left">
                            <i class="fas ${subject.icon}"></i>
                            <h2>${subject.name}</h2>
                            <span class="badge-count">${lessons.length} 节</span>
                        </div>
                        <div class="folder-toggle" data-target="${subjectId}">
                            <i class="fas fa-chevron-down"></i>
                        </div>
                    </div>
                    <div class="folder-content" id="content-${subjectId}">
                        <div class="video-grid">`;

                lessons.forEach((lesson, lIdx) => {
                    const isUnlocked = activated || lesson.isFree;
                    const lockedClass = isUnlocked ? '' : 'locked';
                    const freeClass = lesson.isFree ? 'free' : '';
                    const lockDisplay = isUnlocked ? 'none' : 'flex';
                    const playerDisplay = isUnlocked ? 'block' : 'none';
                    const placeholderDisplay = isUnlocked ? 'none' : 'flex';

                    let statusText = '';
                    if (lesson.isFree && !activated) {
                        statusText = '<i class="fas fa-play" style="color:#ff6b35;"></i> 免费试看';
                    } else if (activated) {
                        statusText = '<i class="fas fa-check-circle" style="color:#2a7a4a;"></i> 已解锁';
                    } else {
                        statusText = '<i class="fas fa-lock"></i> 未解锁';
                    }

                    html += `
                        <div class="video-card ${lockedClass} ${freeClass}" data-locked="${!isUnlocked}">
                            <div class="video-thumbnail">
                                <i class="fas ${subject.icon}"></i>
                                <div class="lock-overlay" style="display:${lockDisplay};"><i class="fas fa-lock"></i></div>
                            </div>
                            <div class="video-meta">
                                <div class="video-title">
                                    ${lesson.title}
                                    ${lesson.isFree ? '<span class="free-tag"><i class="fas fa-play"></i> 试看</span>' : ''}
                                    <span class="section-num">${lIdx+1}/12</span>
                                </div>
                                <div class="video-desc"><i class="fas fa-tag"></i> ${lesson.desc}</div>
                                <div class="video-player-container" style="display:${playerDisplay};">
                                    <video controls preload="metadata">
                                        <source src="${lesson.videoSrc}" type="video/mp4">
                                        您的浏览器不支持 video 标签。
                                    </video>
                                </div>
                                <div class="video-player-placeholder" style="display:${placeholderDisplay};">
                                    <i class="fas fa-play-circle"></i> 激活后观看
                                </div>
                                <span class="unlock-hint">${statusText}</span>
                            </div>
                        </div>
                    `;
                });

                html += `</div></div></div>`;
            });
            container.innerHTML = html;

            document.querySelectorAll('.folder-header').forEach(header => {
                header.addEventListener('click', function() {
                    const targetId = this.dataset.target;
                    const content = document.getElementById(`content-${targetId}`);
                    const toggleIcon = this.querySelector('.folder-toggle i');
                    if (content) {
                        content.classList.toggle('open');
                        this.querySelector('.folder-toggle').classList.toggle('open');
                        toggleIcon.className = content.classList.contains('open') ? 'fas fa-chevron-up' : 'fas fa-chevron-down';
                    }
                });
            });
        }

        function updateAllCards(activated) {
            const cards = document.querySelectorAll('.video-card');
            cards.forEach(card => {
                const isFree = card.classList.contains('free');
                const isUnlocked = activated || isFree;

                const lockOverlay = card.querySelector('.lock-overlay');
                const playerContainer = card.querySelector('.video-player-container');
                const placeholder = card.querySelector('.video-player-placeholder');
                const unlockHint = card.querySelector('.unlock-hint');
                const thumbnailIcon = card.querySelector('.video-thumbnail i');

                if (isUnlocked) {
                    card.classList.remove('locked');
                    card.dataset.locked = 'false';
                    if (lockOverlay) lockOverlay.style.display = 'none';
                    if (placeholder) placeholder.style.display = 'none';
                    if (playerContainer) playerContainer.style.display = 'block';
                    if (thumbnailIcon) thumbnailIcon.style.color = '#b8d9f0';

                    if (isFree && !activated) {
                        unlockHint.innerHTML = '<i class="fas fa-play" style="color:#ff6b35;"></i> 免费试看';
                        unlockHint.style.background = '#fff3e6';
                        unlockHint.style.color = '#ff6b35';
                    } else {
                        unlockHint.innerHTML = '<i class="fas fa-check-circle" style="color:#2a7a4a;"></i> 已解锁';
                        unlockHint.style.background = '#dff0e6';
                        unlockHint.style.color = '#1b6b4a';
                    }
                } else {
                    card.classList.add('locked');
                    card.dataset.locked = 'true';
                    if (lockOverlay) lockOverlay.style.display = 'flex';
                    if (placeholder) placeholder.style.display = 'flex';
                    if (playerContainer) playerContainer.style.display = 'none';
                    if (thumbnailIcon) thumbnailIcon.style.color = 'rgba(255,255,255,0.7)';
                    unlockHint.innerHTML = '<i class="fas fa-lock"></i> 未解锁';
                    unlockHint.style.background = '#eaf3fa';
                    unlockHint.style.color = '#5f7e93';
                }
            });

            globalStatusText.textContent = activated ? `已激活 (${activePhone})` : '未激活';
            globalStatusText.style.color = activated ? '#1b7a4a' : '#b13e3e';
        }

        function showRememberedUser(phone) {
            rememberedPhoneDisplay.textContent = phone;
            rememberedArea.style.display = 'block';
            activationArea.style.display = 'none';
        }

        function hideRememberedUser() {
            rememberedArea.style.display = 'none';
            activationArea.style.display = 'flex';
        }

        async function performActivation(phone, remember = true) {
            if (!phone || phone.trim() === '') {
                setStatus('⚠️ 请输入手机号码', 'error');
                return false;
            }
            const rawPhone = phone.trim();
            if (!/^\d{11}$/.test(rawPhone)) {
                setStatus('❌ 请输入11位有效手机号', 'error');
                return false;
            }

            setStatus('⏳ 正在验证...', 'info');
            try {
                const authorized = await checkPhoneOnGitHub(rawPhone);
                if (authorized) {
                    isActivated = true;
                    activePhone = rawPhone;
                    setStatus(`✅ 激活成功！欢迎回来`, 'success');
                    updateAllCards(true);
                    phoneInput.value = rawPhone;
                    showToast(`✅ 欢迎回来，${rawPhone}`, 'success');

                    if (remember) {
                        setStoredPhone(rawPhone);
                        showRememberedUser(rawPhone);
                    }
                    return true;
                } else {
                    isActivated = false;
                    activePhone = '';
                    setStatus(`❌ 该手机号未激活，请联系管理员`, 'error');
                    updateAllCards(false);
                    showToast(`❌ 手机号未激活`, 'error');
                    return false;
                }
            } catch (err) {
                setStatus(`❌ 验证失败: ${err.message}`, 'error');
                showToast(`❌ ${err.message}`, 'error');
                return false;
            }
        }

        function deactivate() {
            isActivated = false;
            activePhone = '';
            setStatus('🔒 已退出激活', 'info');
            updateAllCards(false);
            phoneInput.value = '';
            clearStoredPhone();
            hideRememberedUser();
        }

        async function tryAutoLogin() {
            const storedPhone = getStoredPhone();
            if (storedPhone) {
                console.log('🔄 尝试自动登录:', storedPhone);
                setStatus('⏳ 正在自动验证...', 'info');
                try {
                    const authorized = await checkPhoneOnGitHub(storedPhone);
                    if (authorized) {
                        isActivated = true;
                        activePhone = storedPhone;
                        updateAllCards(true);
                        showRememberedUser(storedPhone);
                        setStatus(`✅ 已自动激活 (${storedPhone})`, 'success');
                        showToast(`✅ 欢迎回来，${storedPhone}`, 'success');
                        console.log('✅ 自动登录成功');
                        return true;
                    } else {
                        clearStoredPhone();
                        hideRememberedUser();
                        setStatus('📱 该手机号已被撤销，请重新输入', 'info');
                        console.log('⚠️ 存储的手机号已被撤销，已清除');
                        return false;
                    }
                } catch (err) {
                    console.error('自动登录失败:', err);
                    setStatus('📱 请手动输入手机号激活', 'info');
                    return false;
                }
            }
            console.log('📭 没有存储的手机号');
            return false;
        }

        async function init() {
            renderSubjects(false);
            updateAllCards(false);

            const loggedIn = await tryAutoLogin();
            if (!loggedIn) {
                hideRememberedUser();
                setStatus('📱 输入已激活的手机号，或试看第1、3、5节', 'info');
            }

            console.log('🎯 成考视频学习平台已加载（GitHub Issues + 记住我）');
            console.log('📌 调试提示: 在控制台输入 localStorage.getItem("chengkao_activated_phone") 查看存储的值');
        }

        activateBtn.addEventListener('click', function() {
            performActivation(phoneInput.value);
        });

        phoneInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                activateBtn.click();
            }
        });

        phoneInput.addEventListener('input', function() {
            this.value = this.value.replace(/\D/g, '');
        });

        logoutBtn.addEventListener('click', function() {
            if (confirm('确认退出当前账号？下次需要重新输入手机号。')) {
                deactivate();
                hideRememberedUser();
                setStatus('🔒 已退出，请输入手机号重新激活', 'info');
                showToast('✅ 已退出', 'success');
            }
        });

        init();
    })();
</script>
</body>
</html>
